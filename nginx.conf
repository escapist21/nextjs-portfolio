server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    absolute_redirect off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Content-hashed Astro assets — immutable, 1 year
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Vary Accept-Encoding;
    }

    # Self-hosted fonts — immutable, 1 year
    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Static images and pre-generated OG images
    location ~* ^/(images|og)/ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=604800";
    }

    # RSS and sitemap
    location ~* \.(xml|txt)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # All HTML pages
    location / {
        try_files $uri $uri/ $uri.html /404.html =404;
        expires 10m;
        add_header Cache-Control "public, s-maxage=600, stale-while-revalidate=3600";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
